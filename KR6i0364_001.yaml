body:
  text: 西晉月氏三藏竺法護譯聞如是一時佛在舍衛國祇樹給孤獨園大目乾連始得六通欲度父母報乳哺之恩即以道眼觀視世間見其亡母生餓鬼中不見飲食皮骨連立目連悲哀即鉢盛飯往餉其母母得鉢飯便以左手障鉢右手摶飯食未入口化成火炭遂不得食目連大叫悲號啼泣馳還白佛具陳如此佛言汝母罪根深結非汝一人力所奈何汝雖孝順聲動天地天神地神邪魔外道道士四天王神亦不能奈何當須十方衆僧威神之力乃得解脫吾今當為汝説救濟之法令一切難皆離憂苦罪障消除佛告目連十方衆僧於七月十五日僧自恣時當為七世父母及現在父母厄難中者具飯百味五果汲灌盆器香油錠爥床敷臥具盡世甘美以著盆中供養十方大德衆僧當此之日一切聖衆或在山間禪定或得四道果或樹下經行或六通自在教化聲聞緣覺或十地菩薩大人權現比丘在大衆中皆同一心受鉢和羅飯具清淨戒聖衆之道其德汪洋其有供養此等自恣僧者現在父母七世父母六種親屬得出三途之苦應時解脫衣食自然若復有人父母現在者福樂百年若已亡七世父母生天自在化生入天華光受無量快樂時佛敕十方衆僧皆先為施主家呪願七世父母行禪定意然後受食初受盆時先安在佛塔前衆僧呪願竟便自受食爾時目連比丘及此大會大菩薩衆皆大歡喜而目連悲啼泣聲釋然除滅是時目連其母即於是日得脫一劫餓鬼之苦爾時目連復白佛言弟子所生父母得蒙三寶功德之力衆僧威神之力故若未來世一切佛弟子行孝順者亦應奉此盂蘭盆救度現在父母乃至七世父母為可爾不佛言大善快問我正欲説汝今復問善男子若有比丘比丘尼國王太子王子大臣宰相三公百官萬民庶人行孝慈者皆應為所生現在父母過去七世父母於七月十五日佛歡喜日僧自恣日以百味飲食安盂蘭盆中施十方自恣僧乞願便使現在父母壽命百年無病無一切苦惱之患乃至七世父母離餓鬼苦得生天人中福樂無極佛告諸善男子善女人是佛弟子修孝順者應念念中常憶父母供養乃至七世父母年年七月十五日常以孝順慈憶所生父母乃至七世父母為作盂蘭盆施佛及僧以報父母長養慈愛之恩若一切佛弟子應當奉持是法爾時目連比丘四輩弟子聞佛所説歡喜奉行
